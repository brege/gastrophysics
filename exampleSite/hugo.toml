baseURL = "https://gastrophysics.brege.org/"
locale = "en"
title = "Gastrophysics"
copyright = "Copyright (c) 2026 Wyatt Brege"

enableInlineShortcodes = true
enableRobotsTXT = true

[module]
  [[module.imports]]
    path = "github.com/brege/gastrophysics"

[outputs]
  home = [ "HTML", "RSS", "JSON", "LLMS", "LLMSFull" ]
  page = [ "HTML", "PageMarkdown" ]

[outputFormats.LLMS]
  mediaType = "text/plain"
  baseName = "llms"
  isPlainText = true
  rel = "alternate"

[outputFormats.LLMSFull]
  mediaType = "text/plain"
  baseName = "llms-full"
  isPlainText = true
  rel = "alternate"

[outputFormats.PageMarkdown]
  mediaType = "text/markdown"
  baseName = "index"
  isPlainText = true
  rel = "alternate"
  ugly = true

[mediaTypes."text/markdown"]
  suffixes = [ "md" ]

[outputFormats.CVMarkdown]
  mediaType = "text/markdown"
  baseName = "index"
  isPlainText = true
  notAlternative = true

[markup.goldmark.renderer]
  unsafe = true

[markup.highlight]
  noClasses = false

[params]
  env = "development"
  author = "Gastrophysics Demo"
  name = "Gastrophysics"
  description = "Food writing, recipes, menus, and a CV."
  colorLight = "linen"
  colorDark = "nord"
  defaultTheme = "auto"
  ShowToc = true
  TocOpen = false
  ShowBreadCrumbs = true
  ShowWordCount = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowCodeCopyButtons = true
  seriesOpened = false
  disableScrollToTop = true
  mainSections = [ "post" ]
  homePageSize = 3
  postPageSize = 6

  [params.paletteBand]
    enabled = true
    defaultVisible = true
    showToggle = true
    position = "belowHeader"

  [[params.headerActions]]
    name = "GitHub"
    icon = "github"
    url = "https://github.com/brege/gastrophysics"
    title = "Gastrophysics on GitHub"
    label = "Gastrophysics on GitHub"

[params.label]
  text = "Gastrophysics"

[params.homeInfoParams]
  Title = "Gastrophysics"
  FeedTitle = "Posts"
  Content = "/hero"

  [[params.homeInfoParams.roles]]
    name = "foodie"

  [[params.homeInfoParams.roles]]
    name = "student"

  [[params.homeInfoParams.roles]]
    name = "amateur astronomer"

  [[params.homeInfoParams.markers]]
    name = "recipes"
    url = "/recipes/"

  [[params.homeInfoParams.markers]]
    name = "menus"
    url = "/menus/"

  [[params.homeInfoParams.markers]]
    name = "posts"
    url = "/post/"

[menu]
  [[menu.main]]
    identifier = "recipes"
    name = "Recipes"
    url = "/recipes/"
    weight = 10

  [[menu.main]]
    identifier = "menus"
    name = "Menus"
    url = "/menus/"
    weight = 20

  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    url = "/post/"
    weight = 30

  [[menu.main]]
    identifier = "cv"
    name = "CV"
    url = "/cv/"
    weight = 40

  [[menu.main]]
    identifier = "search"
    name = "Search"
    url = "/search/"
    weight = 50

[taxonomies]
  category = "categories"
  tag = "tags"
  series = "series"

[params.llms]
  summary = "Hugo theme for multi-career portfolios with recipes, menus, and CV layouts."

[[params.llms.sections]]
  title = "Content"
  [[params.llms.sections.links]]
    title = "Recipes"
    url = "/recipes/"
    pageRef = "recipes"
    description = "Recipe collection with structured markup."
  [[params.llms.sections.links]]
    title = "Menus"
    url = "/menus/"
    pageRef = "menus"
    description = "Tasting menu archive."
  [[params.llms.sections.links]]
    title = "Posts"
    url = "/post/"
    pageRef = "post"
    description = "Blog posts and articles."
  [[params.llms.sections.links]]
    title = "CV"
    url = "/cv/"
    pageRef = "cv"
    description = "YAML-driven CV layout."

[[params.llms.sections]]
  title = "Machine-readable"
  [[params.llms.sections.links]]
    title = "Sitemap"
    url = "/sitemap.xml"
    description = "XML sitemap."
  [[params.llms.sections.links]]
    title = "RSS"
    url = "/index.xml"
    description = "RSS feed."
