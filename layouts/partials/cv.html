{{- $data := dict -}}
{{- with .Resources.GetMatch "cv.yaml" -}}
  {{- $data = . | transform.Unmarshal -}}
{{- else -}}
  {{- errorf "missing cv.yaml for %s" $.File.Path -}}
{{- end -}}
<div class="cv-sheet" hidden>
  {{- range $data.sections -}}
    {{- partial "cv/section.html" . -}}
  {{- end -}}
</div>
