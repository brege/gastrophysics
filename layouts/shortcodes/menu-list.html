{{- $section := .Get "section" -}}

{{- with site.GetPage $section }}
<div class="menu-list-shortcode">
  <ul class="menu-index-list">
    {{- range .Pages.ByDate.Reverse }}
    <li class="menu-index-item">
      <h3 class="menu-index-title"><a href="{{ .RelPermalink }}">{{ .Title }}</a></h3>
    </li>
    {{- end }}
  </ul>
</div>
{{- end }}
